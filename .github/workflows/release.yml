name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      skip_publish:
        description: "Run E2E only, skip npm publish"
        type: boolean
        default: true
      skip_e2e:
        description: "Skip E2E tests (use when XMTP infra is down)"
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate:
    name: Lint, Typecheck, Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      # OWS is needed by the ows.test.ts unit tests (wallet + signing helpers)
      - name: Install OWS
        run: curl -fsSL https://docs.openwallet.sh/install.sh | bash

      - run: bun run lint

      - run: bun run typecheck

      - run: bun run build

      - run: bun run test

      # Validate tag version matches package.json versions (only on tag push)
      - name: Validate version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          for pkg in packages/core/package.json packages/sdk/package.json packages/cli/package.json packages/openclaw-plugin/package.json; do
            PKG_VERSION=$(node -e "const fs=require('fs'); console.log(JSON.parse(fs.readFileSync('$pkg','utf8')).version)")
            if [[ "$PKG_VERSION" != "$TAG_VERSION" ]]; then
              echo "::error::Version mismatch: $pkg has $PKG_VERSION but tag is v$TAG_VERSION"
              exit 1
            fi
          done
          echo "All packages at version $TAG_VERSION"

  e2e:
    name: E2E (${{ matrix.chain }})
    needs: [validate]
    if: inputs.skip_e2e != true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      # Both chains share the same OWS wallets (same XMTP inbox IDs).
      # Parallel runs would trigger XMTP installation revocation conflicts.
      # Use per-chain wallet secrets to enable parallel execution.
      max-parallel: 1
      matrix:
        chain: [base, taiko]
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Validate E2E secrets
        run: |
          missing=0
          for var in E2E_AGENT_A_OWS_WALLET E2E_AGENT_A_OWS_MNEMONIC E2E_AGENT_B_OWS_WALLET E2E_AGENT_B_OWS_MNEMONIC; do
            if [ -z "${!var}" ]; then
              echo "::error::Required E2E secret $var is not set or empty"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then exit 1; fi
        env:
          E2E_AGENT_A_OWS_WALLET: ${{ secrets.E2E_AGENT_A_OWS_WALLET }}
          E2E_AGENT_A_OWS_MNEMONIC: ${{ secrets.E2E_AGENT_A_OWS_MNEMONIC }}
          E2E_AGENT_B_OWS_WALLET: ${{ secrets.E2E_AGENT_B_OWS_WALLET }}
          E2E_AGENT_B_OWS_MNEMONIC: ${{ secrets.E2E_AGENT_B_OWS_MNEMONIC }}

      - name: Install OWS
        run: curl -fsSL https://docs.openwallet.sh/install.sh | bash

      - name: Import E2E wallets into OWS vault
        run: |
          OWS_MNEMONIC="${{ secrets.E2E_AGENT_A_OWS_MNEMONIC }}" ows wallet import --name "${{ secrets.E2E_AGENT_A_OWS_WALLET }}" --mnemonic
          OWS_MNEMONIC="${{ secrets.E2E_AGENT_B_OWS_MNEMONIC }}" ows wallet import --name "${{ secrets.E2E_AGENT_B_OWS_WALLET }}" --mnemonic
          echo "Imported wallets:"
          ows wallet list | grep -E "Name:|eip155:1"

      # Cache XMTP DB files so the same installation is reused across runs.
      # Without this, each run registers new installations and eventually
      # exhausts the 10-per-inbox limit and the 256 lifetime update budget.
      - name: Cache XMTP databases
        uses: actions/cache@v4
        with:
          path: /tmp/xmtp-e2e-db
          key: xmtp-e2e-db-${{ matrix.chain }}

      # If installations are saturated (10/10) and no cached DB exists,
      # revoke all installations so the test can register fresh ones.
      - name: Reset XMTP installations if saturated
        working-directory: packages/core
        run: bun scripts/reset-xmtp-installations.ts
        env:
          E2E_AGENT_A_OWS_WALLET: ${{ secrets.E2E_AGENT_A_OWS_WALLET }}
          E2E_AGENT_B_OWS_WALLET: ${{ secrets.E2E_AGENT_B_OWS_WALLET }}

      - name: Run E2E tests (${{ matrix.chain }})
        run: bun vitest run packages/cli/test/e2e/e2e-live.test.ts --reporter=verbose
        env:
          E2E_CHAIN: ${{ matrix.chain }}
          E2E_AGENT_A_OWS_WALLET: ${{ secrets.E2E_AGENT_A_OWS_WALLET }}
          E2E_AGENT_B_OWS_WALLET: ${{ secrets.E2E_AGENT_B_OWS_WALLET }}
          E2E_XMTP_DB_CACHE: /tmp/xmtp-e2e-db
          TAP_DIAG: "1"

  publish:
    name: Publish
    needs: [validate, e2e]
    if: always() && needs.validate.result == 'success' && (needs.e2e.result == 'success' || needs.e2e.result == 'skipped') && startsWith(github.ref, 'refs/tags/v') && (inputs.skip_publish != true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run build

      # Copy skills into OpenClaw plugin for npm tarball
      - name: Bundle skills into OpenClaw plugin
        run: |
          rm -rf packages/openclaw-plugin/skills
          mkdir -p packages/openclaw-plugin/skills
          cp -r skills/trusted-agents packages/openclaw-plugin/skills/trusted-agents

      - name: Verify release package metadata
        run: bun run verify:release

      # Replace workspace:* with the actual tag version so tarballs have correct deps.
      # bun publish resolves workspace:* from the lockfile, which may be stale after
      # a version bump commit. This step makes the resolution explicit.
      - name: Resolve workspace dependencies
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          for pkg in packages/sdk/package.json packages/cli/package.json packages/openclaw-plugin/package.json; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$pkg', 'utf8'));
              let changed = false;
              for (const [dep, ver] of Object.entries(pkg.dependencies || {})) {
                if (typeof ver === 'string' && ver.startsWith('workspace:')) {
                  pkg.dependencies[dep] = '$TAG_VERSION';
                  changed = true;
                }
              }
              if (changed) {
                fs.writeFileSync('$pkg', JSON.stringify(pkg, null, 2) + '\n');
                console.log('Resolved workspace deps in $pkg to $TAG_VERSION');
              }
            "
          done

      # Verify tarballs have correct dependency versions before publishing
      - name: Verify tarballs
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          cd packages/core && bun pm pack --dry-run && cd ../..
          for pkg_dir in packages/sdk packages/cli packages/openclaw-plugin; do
            cd "$pkg_dir"
            bun pm pack --dry-run
            TARBALL=$(bun pm pack 2>&1 | grep '\.tgz$')
            tar -xzf "$TARBALL"
            CORE_DEP=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package/package.json','utf8')).dependencies['trusted-agents-core'] || 'MISSING')")
            rm -rf package "$TARBALL"
            if [[ "$CORE_DEP" != "$TAG_VERSION" ]]; then
              echo "::error::$pkg_dir has trusted-agents-core@$CORE_DEP but expected $TAG_VERSION"
              exit 1
            fi
            echo "$pkg_dir: trusted-agents-core@$CORE_DEP ✓"
            cd ../..
          done

      # Configure npm auth
      - name: Configure npm
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Resolve release channel
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          RELEASE_CHANNEL_JSON="$(node scripts/release-channel.mjs "$TAG_VERSION")"
          export RELEASE_CHANNEL_JSON
          NPM_DIST_TAG="$(node -e 'const data = JSON.parse(process.env.RELEASE_CHANNEL_JSON); process.stdout.write(data.npmDistTag ?? "")')"
          IS_PRERELEASE="$(node -e 'const data = JSON.parse(process.env.RELEASE_CHANNEL_JSON); process.stdout.write(data.isPrerelease ? "true" : "false")')"
          echo "NPM_DIST_TAG=$NPM_DIST_TAG" >> "$GITHUB_ENV"
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> "$GITHUB_ENV"
          echo "Resolved release channel: prerelease=$IS_PRERELEASE npm_dist_tag=${NPM_DIST_TAG:-latest}"

      # Publish in dependency order: core first, then cli and tap
      # --provenance requires id-token: write permission (set above)
      # Each step checks if version exists before publishing to handle re-runs
      - name: Publish trusted-agents-core
        working-directory: packages/core
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if npm view "trusted-agents-core@$TAG_VERSION" version 2>/dev/null; then
            echo "trusted-agents-core@$TAG_VERSION already published, skipping"
          else
            if [[ -n "${NPM_DIST_TAG:-}" ]]; then
              bun publish --access public --no-git-checks --provenance --tag "$NPM_DIST_TAG"
            else
              bun publish --access public --no-git-checks --provenance
            fi
          fi
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish trusted-agents-sdk
        working-directory: packages/sdk
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if npm view "trusted-agents-sdk@$TAG_VERSION" version 2>/dev/null; then
            echo "trusted-agents-sdk@$TAG_VERSION already published, skipping"
          else
            if [[ -n "${NPM_DIST_TAG:-}" ]]; then
              bun publish --access public --no-git-checks --provenance --tag "$NPM_DIST_TAG"
            else
              bun publish --access public --no-git-checks --provenance
            fi
          fi
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish trusted-agents-cli
        working-directory: packages/cli
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if npm view "trusted-agents-cli@$TAG_VERSION" version 2>/dev/null; then
            echo "trusted-agents-cli@$TAG_VERSION already published, skipping"
          else
            if [[ -n "${NPM_DIST_TAG:-}" ]]; then
              bun publish --access public --no-git-checks --provenance --tag "$NPM_DIST_TAG"
            else
              bun publish --access public --no-git-checks --provenance
            fi
          fi
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish trusted-agents-tap
        working-directory: packages/openclaw-plugin
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if npm view "trusted-agents-tap@$TAG_VERSION" version 2>/dev/null; then
            echo "trusted-agents-tap@$TAG_VERSION already published, skipping"
          else
            if [[ -n "${NPM_DIST_TAG:-}" ]]; then
              bun publish --access public --no-git-checks --provenance --tag "$NPM_DIST_TAG"
            else
              bun publish --access public --no-git-checks --provenance
            fi
          fi
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create GitHub Release with auto-generated notes (skip if already exists for reruns)
      - name: Create GitHub Release
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists, skipping"
          else
            PRERELEASE_FLAG=""
            if [[ "$IS_PRERELEASE" == "true" ]]; then
              PRERELEASE_FLAG="--prerelease"
            fi
            gh release create "$GITHUB_REF_NAME" --generate-notes $PRERELEASE_FLAG
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
