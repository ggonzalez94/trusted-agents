<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <style>
    text { font-family: -apple-system, 'Segoe UI', system-ui, Helvetica, sans-serif; }
    .name { font-size: 21px; font-weight: 700; fill: rgba(255,255,255,0.8); }
    .name-highlight { font-size: 22px; font-weight: 800; fill: #fbbf24; }
    .example { font-size: 13px; font-weight: 400; fill: rgba(255,255,255,0.3); letter-spacing: 0.5px; }
    .seg { font-size: 14px; font-weight: 600; fill: rgba(255,255,255,0.65); }
    .cat { font-size: 11px; font-weight: 600; fill: rgba(255,255,255,0.2); letter-spacing: 2.5px; text-transform: uppercase; }
  </style>

  <defs>
    <!-- Subtle dot grid pattern -->
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.6" fill="rgba(255,255,255,0.04)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="#09090f"/>
  <rect width="1200" height="700" fill="url(#dots)"/>

  <!-- Left connector line -->
  <line x1="96" y1="158" x2="96" y2="542" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Connector dots -->
  <circle cx="96" cy="158" r="3" fill="#10b981" opacity="0.5"/>
  <circle cx="96" cy="254" r="4" fill="#f59e0b"/>
  <circle cx="96" cy="350" r="3" fill="#06b6d4" opacity="0.5"/>
  <circle cx="96" cy="446" r="3" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="96" cy="542" r="3" fill="#3b82f6" opacity="0.5"/>

  <!-- Applications label -->
  <text x="600" y="106" text-anchor="middle" class="cat">Applications</text>

  <!-- Applications (outlined, segmented) -->
  <rect x="120" y="117" width="960" height="82" rx="10" fill="none" stroke="#10b981" stroke-width="1" opacity="0.3"/>
  <rect x="120" y="121" width="4" height="74" rx="2" fill="#10b981" opacity="0.5"/>
  <line x1="358" y1="129" x2="358" y2="187" stroke="#10b981" stroke-width="0.5" opacity="0.25"/>
  <line x1="648" y1="129" x2="648" y2="187" stroke="#10b981" stroke-width="0.5" opacity="0.25"/>
  <line x1="888" y1="129" x2="888" y2="187" stroke="#10b981" stroke-width="0.5" opacity="0.25"/>
  <text x="239" y="163" text-anchor="middle" class="seg">Scheduling</text>
  <text x="503" y="163" text-anchor="middle" class="seg">Payments &amp; Settlement</text>
  <text x="768" y="163" text-anchor="middle" class="seg">P2P Betting</text>
  <text x="984" y="163" text-anchor="middle" class="seg" opacity="0.3">· · ·</text>

  <!-- Coordination & Trust (FILLED - stands out) -->
  <rect x="120" y="213" width="960" height="82" rx="10" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="120" y="217" width="4" height="74" rx="2" fill="#f59e0b"/>
  <text x="600" y="261" text-anchor="middle" class="name-highlight">Coordination &amp; Trust</text>

  <!-- Messaging (outlined) -->
  <rect x="120" y="309" width="960" height="82" rx="10" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
  <rect x="120" y="313" width="4" height="74" rx="2" fill="#06b6d4" opacity="0.5"/>
  <text x="600" y="347" text-anchor="middle" class="name">Messaging</text>
  <text x="600" y="369" text-anchor="middle" class="example">XMTP</text>

  <!-- Identity (outlined) -->
  <rect x="120" y="405" width="960" height="82" rx="10" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
  <rect x="120" y="409" width="4" height="74" rx="2" fill="#8b5cf6" opacity="0.5"/>
  <text x="600" y="443" text-anchor="middle" class="name">Identity</text>
  <text x="600" y="465" text-anchor="middle" class="example">ERC-8004</text>

  <!-- Agent Harness (outlined) -->
  <rect x="120" y="501" width="960" height="82" rx="10" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  <rect x="120" y="505" width="4" height="74" rx="2" fill="#3b82f6" opacity="0.5"/>
  <text x="600" y="539" text-anchor="middle" class="name">Agent Harness</text>
  <text x="600" y="561" text-anchor="middle" class="example">OpenClaw · Claude Code</text>
</svg>
